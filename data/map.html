<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style> #map { height: 100vh; } </style>
</head>
<body>
<div id="map"></div>
<script>
  const map = L.map('map').setView([53.3498, -6.2603], 14); // Dublin default

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }).addTo(map);

  function carIcon(heading) {
    return L.divIcon({
      className: '',
      html: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 64 64"
               style="transform: rotate(${heading}deg); transform-origin: 50% 50%;">
               <rect x="20" y="8"  width="24" height="10" rx="4" fill="#333"/>
               <rect x="14" y="16" width="36" height="28" rx="6" fill="#1a73e8"/>
               <rect x="18" y="18" width="12" height="8"  rx="2" fill="#a8d8ff"/>
               <rect x="34" y="18" width="12" height="8"  rx="2" fill="#a8d8ff"/>
               <circle cx="20" cy="46" r="6" fill="#222"/>
               <circle cx="44" cy="46" r="6" fill="#222"/>
               <circle cx="20" cy="46" r="3" fill="#888"/>
               <circle cx="44" cy="46" r="3" fill="#888"/>
             </svg>`,
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    });
  }

  const marker = L.marker([53.3498, -6.2603], { icon: carIcon(0) }).addTo(map);

  const ws = new WebSocket('ws://127.0.0.1:8080');

  ws.onmessage = (event) => {
    const state = JSON.parse(event.data);
    marker.setLatLng([state.lat, state.lon]);
    marker.setIcon(carIcon(state.heading));
    map.panTo([state.lat, state.lon]);
    marker.bindPopup(`Speed: ${state.speed} m/s | Heading: ${state.heading}°`).openPopup();
  };
</script>
</body>
</html>
